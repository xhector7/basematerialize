<html>
<head>
    <meta charset="utf-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1">

    <title>Base Materialize</title>

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@materializecss/materialize/dist/css/materialize.min.css">

    <link
        href="https://fonts.googleapis.com/icon?family=Material+Icons"
        rel="stylesheet">
</head>

<body>

<nav class="blue">
    <div class="nav-wrapper">
        <a href="#" class="brand-logo center">
            MaterialApp
        </a>

        <a
            href="#"
            data-target="slide-out"
            class="sidenav-trigger">
            <i class="material-icons">menu</i>
        </a>
    </div>
</nav>

<ul id="slide-out" class="sidenav">

    <li>
        <div class="user-view">

            <div class="background blue"></div>

            <a href="#">
                <img
                    class="circle"
                    src="">
            </a>

            <a href="#">
                <span class="white-text name">
                    Hector
                </span>
            </a>

            <a href="#">
                <span class="white-text email">
                    hector@gmail.com
                </span>
            </a>

        </div>
    </li>

    <li>
        <a href="#inici">
            <i class="material-icons">home</i>
            Inici
        </a>
    </li>

    <li>
        <a href="#perfil">
            <i class="material-icons">person</i>
            Perfil
        </a>
    </li>

    <li>
        <a href="#config">
            <i class="material-icons">settings</i>
            Configuració
        </a>
    </li>

</ul>

<div class="container">

    <ul class="tabs">

        <li class="tab col s3">
            <a href="#inici">
                Inici
            </a>
        </li>

        <li class="tab col s3">
            <a href="#perfil">
                Perfil
            </a>
        </li>

        <li class="tab col s3">
            <a href="#config">
                Configuració
            </a>
        </li>

    </ul>

    <div id="inici" class="section">
        <h4>Inici</h4>
        <p>Pantalla principal de l'aplicació.</p>
    </div>

    <div id="perfil" class="section">
        <h4>Perfil</h4>
        <p>Dades de l'usuari.</p>
    </div>

    <div id="config" class="section">
        <h4>Configuració</h4>
        <p>Opcions de l'aplicació.</p>
    </div>

</div>

<script src="cordova.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@materializecss/materialize/dist/js/materialize.min.js"></script>

<script src="js/index.js"></script>

</body>
</html>
